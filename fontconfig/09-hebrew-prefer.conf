<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Lambda image fontconfig override.

  Without this, LibreOffice running on Debian Bookworm picks
  NotoSansDevanagari (an Indic-script font) as the Hebrew fallback when
  the cell font is Calibri/Carlito — Carlito has no Hebrew glyphs, so
  fontconfig's default fallback chain selects the wrong Noto family.

  This file inserts NotoSansHebrew explicitly into the prefer-chain for
  the fonts the template uses (Calibri/Carlito) and as a generic Hebrew
  preference, so LO finds the right glyphs before stumbling onto
  Devanagari.
-->
<fontconfig>

  <!-- Generic preference: when text is tagged Hebrew, try NotoSansHebrew
       first. This catches direct Hebrew runs that don't go through the
       Carlito→fallback chain. -->
  <match target="pattern">
    <test name="lang" compare="contains">
      <string>he</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans Hebrew</string>
    </edit>
  </match>

  <!-- Calibri-substitute fallback chain: Carlito for Latin/Greek/Cyrillic,
       NotoSansHebrew for Hebrew, DejaVuSans as last resort. -->
  <alias binding="strong">
    <family>Calibri</family>
    <prefer>
      <family>Carlito</family>
      <family>Noto Sans Hebrew</family>
      <family>DejaVu Sans</family>
    </prefer>
  </alias>

  <!-- Carlito itself: when used directly, fall back to NotoSansHebrew for
       Hebrew glyphs. -->
  <alias binding="strong">
    <family>Carlito</family>
    <accept>
      <family>Carlito</family>
      <family>Noto Sans Hebrew</family>
    </accept>
  </alias>

</fontconfig>
